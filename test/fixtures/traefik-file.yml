http:
  routers:
    blog:
      rule: "Host(`blog.example.com`)"
      service: blog-svc
      tls: {}
    api:
      rule: "Host(`api.example.com`) || Host(`api2.example.com`)"
      service: api-svc
      entryPoints:
        - websecure
  services:
    blog-svc:
      loadBalancer:
        servers:
          - url: "http://ghost:2368"
    api-svc:
      loadBalancer:
        servers:
          - url: "http://10.0.0.9:9000"

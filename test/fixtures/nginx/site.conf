# plain nginx reverse proxy — upstream block + two server blocks
upstream blog_backend {
    server ghost:2368;
}

server {
    listen 80;
    listen 443 ssl;
    server_name blog.example.com www.blog.example.com;
    ssl_certificate /etc/letsencrypt/live/blog/fullchain.pem;

    location / {
        proxy_pass http://blog_backend;
        proxy_set_header Host $host;
    }
}

# direct host:port upstream, no TLS
server {
    listen 80;
    server_name app.example.com;
    location / {
        proxy_pass http://10.0.0.5:8080;
    }
}

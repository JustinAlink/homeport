server {
  set $forward_scheme http;
  set $server         "webapp";
  set $port           8080;
  listen 80;
  listen 443 ssl;
  server_name app.example.com www.app.example.com;
  ssl_certificate /etc/letsencrypt/live/npm-1/fullchain.pem;
  location / {
    proxy_pass $forward_scheme://$server:$port;
  }
}
